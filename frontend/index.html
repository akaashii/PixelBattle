<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Battle</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0d1117;--surface:#161b22;--border:#30363d;
    --text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;
  }
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'SF Pro Text',-apple-system,system-ui,sans-serif;
    -webkit-tap-highlight-color:transparent;touch-action:none}

  #app{display:flex;flex-direction:column;height:100%}

  /* ── TOP BAR ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:6px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
  .team-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;
    border-radius:16px;font-size:12px;font-weight:600}
  .team-badge .dot{width:7px;height:7px;border-radius:50%}
  .coords{font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums}

  /* ── CANVAS ── */
  .canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:crosshair}
  #pixelCanvas{position:absolute;image-rendering:pixelated;image-rendering:crisp-edges}
  .hover-cell{position:absolute;pointer-events:none;border:2px solid rgba(255,255,255,0.7);
    box-shadow:0 0 6px rgba(255,255,255,0.3);display:none;z-index:5}

  /* ── PALETTE ── */
  .palette-bar{display:flex;flex-wrap:wrap;gap:2px;padding:6px 8px;
    background:var(--surface);border-top:1px solid var(--border);
    justify-content:center;flex-shrink:0;z-index:10;max-height:68px;overflow-y:auto}
  .palette-bar .swatch{width:24px;height:24px;border-radius:4px;border:2px solid transparent;
    cursor:pointer;transition:transform 0.1s,border-color 0.1s;flex-shrink:0}
  .palette-bar .swatch:hover{transform:scale(1.15)}
  .palette-bar .swatch.active{border-color:#fff;transform:scale(1.2);
    box-shadow:0 0 8px rgba(255,255,255,0.4)}

  /* ── BOTTOM BAR ── */
  .bottombar{display:flex;align-items:center;gap:8px;padding:8px 12px;
    background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;z-index:10}

  .cooldown-ring{position:relative;width:40px;height:40px;flex-shrink:0}
  .cooldown-ring svg{width:40px;height:40px;transform:rotate(-90deg)}
  .cooldown-ring .track{fill:none;stroke:var(--border);stroke-width:3}
  .cooldown-ring .progress{fill:none;stroke:var(--accent);stroke-width:3;
    stroke-linecap:round;transition:stroke-dashoffset 0.3s ease}
  .cooldown-ring .label{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}

  .cooldown-info{flex:1;min-width:0}
  .cooldown-info .status{font-size:13px;font-weight:600}
  .cooldown-info .hint{font-size:10px;color:var(--text-dim);margin-top:1px}

  .stats-mini{display:flex;gap:6px;font-size:11px;font-variant-numeric:tabular-nums}
  .stats-mini .stat{display:flex;align-items:center;gap:3px}
  .stats-mini .stat .dot{width:6px;height:6px;border-radius:50%}

  .ready .cooldown-ring .progress{stroke:#3fb950}
  .ready .status{color:#3fb950}

  /* ── SELECTED COLOR PREVIEW ── */
  .color-preview{width:28px;height:28px;border-radius:6px;border:2px solid #fff;flex-shrink:0}

  /* ── LOADING ── */
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:100;transition:opacity 0.3s}
  .loading-overlay.hidden{opacity:0;pointer-events:none}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{font-size:13px;color:var(--text-dim)}

  .toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#da3633;
    color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;
    opacity:0;transition:opacity 0.3s;z-index:50;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Загрузка карты...</div>
  </div>

  <div class="topbar">
    <div class="team-badge" id="teamBadge">
      <span class="dot" id="teamDot"></span>
      <span id="teamName">-</span>
    </div>
    <div class="coords" id="coordsDisplay">-</div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="pixelCanvas"></canvas>
    <div class="hover-cell" id="hoverCell"></div>
  </div>

  <div class="palette-bar" id="paletteBar"></div>

  <div class="bottombar" id="bottomBar">
    <div class="cooldown-ring" id="cooldownRing">
      <svg viewBox="0 0 44 44">
        <circle class="track" cx="22" cy="22" r="19"></circle>
        <circle class="progress" id="cdProgress" cx="22" cy="22" r="19"
          stroke-dasharray="119.38" stroke-dashoffset="0"></circle>
      </svg>
      <div class="label" id="cdLabel">OK</div>
    </div>
    <div class="cooldown-info">
      <div class="status" id="cdStatus">Готово</div>
      <div class="hint" id="cdHint">Выберите цвет и нажмите на пиксель</div>
    </div>
    <div class="color-preview" id="colorPreview"></div>
    <div class="stats-mini" id="statsMini">
      <div class="stat"><span class="dot" style="background:#E63946"></span><span id="statRed">0</span></div>
      <div class="stat"><span class="dot" style="background:#457B9D"></span><span id="statBlue">0</span></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();

const API_BASE = '';
const CIRCUMFERENCE = 2 * Math.PI * 19;
const BPP = 2; // bytes per pixel

let gameId=null, userId=null, myTeam=null, myColor='#fff';
let canvasWidth=100, canvasHeight=100;
let palette=[];
let selectedColor=27; // default black
let pixelData=null; // Uint8Array (2 bytes per pixel)
let cooldownEnd=0, cooldownTimer=null, ws=null;

let scale=1, offsetX=0, offsetY=0, minScale=1;
let isDragging=false, dragStartX=0, dragStartY=0, dragOffsetX=0, dragOffsetY=0, lastPinchDist=0;
let stats={1:0, 2:0};

const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const hoverCell = document.getElementById('hoverCell');
const loadingOverlay = document.getElementById('loadingOverlay');

function getParams(){
  const p = new URLSearchParams(window.location.search);
  gameId = parseInt(p.get('game_id'),10);
  if(tg?.initDataUnsafe?.user?.id) userId = tg.initDataUnsafe.user.id;
  else userId = parseInt(p.get('user_id'),10)||1;
}

function showToast(msg, dur=2500){
  const el=document.getElementById('toast'); el.textContent=msg;
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'), dur);
}

// ── PALETTE UI ──
function buildPalette(){
  const bar = document.getElementById('paletteBar');
  bar.innerHTML = '';
  palette.forEach((hex, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === selectedColor ? ' active' : '');
    s.style.background = hex;
    s.dataset.index = i;
    s.addEventListener('click', () => selectColor(i));
    bar.appendChild(s);
  });
  updateColorPreview();
}

function selectColor(i){
  selectedColor = i;
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.index) === i);
  });
  updateColorPreview();
  if(tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

function updateColorPreview(){
  const el = document.getElementById('colorPreview');
  el.style.background = palette[selectedColor] || '#000';
}

// ── INIT ──
async function init(){
  getParams();
  if(!gameId){showToast('Ошибка: нет game_id');return}
  try{
    const cr = await fetch(`${API_BASE}/api/canvas/${gameId}`);
    const cd = await cr.json();
    canvasWidth=cd.width; canvasHeight=cd.height;
    palette = cd.palette || [];

    const raw=atob(cd.data);
    pixelData=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) pixelData[i]=raw.charCodeAt(i);

    const mr=await fetch(`${API_BASE}/api/me?game_id=${gameId}&user_id=${userId}`);
    if(!mr.ok){showToast('Вы не участник этой игры');return}
    const md=await mr.json();
    myTeam=md.team; myColor=md.team_color;

    document.getElementById('teamName').textContent=md.team_name;
    document.getElementById('teamDot').style.background=myColor;
    document.getElementById('teamBadge').style.background=myColor+'22';
    document.getElementById('teamBadge').style.border=`1px solid ${myColor}44`;

    if(md.cooldown_remaining>0) startCooldown(md.cooldown_remaining);

    buildPalette();
    setupCanvas(); renderCanvas(); countStats(); updateStatsUI();
    connectWS();
    loadingOverlay.classList.add('hidden');
  }catch(e){console.error(e);showToast('Ошибка загрузки')}
}

// ── CANVAS ──
function setupCanvas(){
  canvas.width=canvasWidth; canvas.height=canvasHeight;
  const wr=wrap.getBoundingClientRect();
  const sx=wr.width/canvasWidth, sy=wr.height/canvasHeight;
  minScale=Math.min(sx,sy); scale=minScale;
  offsetX=(wr.width-canvasWidth*scale)/2;
  offsetY=(wr.height-canvasHeight*scale)/2;
  applyTransform();
}
function applyTransform(){
  canvas.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  canvas.style.transformOrigin='0 0';
}

function hexToRgb(hex){
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function renderCanvas(){
  const img=ctx.createImageData(canvasWidth,canvasHeight);
  const d=img.data;
  const totalPixels=canvasWidth*canvasHeight;

  for(let p=0;p<totalPixels;p++){
    const off=p*BPP;
    const team=pixelData[off];
    const colorIdx=pixelData[off+1];
    const idx=p*4;

    if(team===0){
      const x=p%canvasWidth, y=Math.floor(p/canvasWidth);
      const ch=(x+y)%2===0;
      d[idx]=ch?22:26; d[idx+1]=ch?27:32; d[idx+2]=ch?34:40; d[idx+3]=255;
    } else {
      const hex=palette[colorIdx]||'#999';
      const [r,g,b]=hexToRgb(hex);
      d[idx]=r; d[idx+1]=g; d[idx+2]=b; d[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
}

function renderPixel(x,y,colorIdx){
  const hex=palette[colorIdx]||'#999';
  const [r,g,b]=hexToRgb(hex);
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  ctx.fillRect(x,y,1,1);
}

// ── STATS ──
function countStats(){
  stats={1:0,2:0};
  const total=canvasWidth*canvasHeight;
  for(let p=0;p<total;p++){
    const t=pixelData[p*BPP];
    if(t in stats) stats[t]++;
  }
}
function updateStatsUI(){
  document.getElementById('statRed').textContent=stats[1]||0;
  document.getElementById('statBlue').textContent=stats[2]||0;
}

// ── COOLDOWN ──
function startCooldown(seconds){
  cooldownEnd=Date.now()+seconds*1000;
  document.getElementById('bottomBar').classList.remove('ready');
  if(cooldownTimer) clearInterval(cooldownTimer);
  cooldownTimer=setInterval(()=>{
    const rem=Math.max(0,cooldownEnd-Date.now())/1000;
    if(rem<=0){clearInterval(cooldownTimer);cooldownTimer=null;setCooldownUI(0);return}
    setCooldownUI(rem);
  },200);
}

function setCooldownUI(rem){
  const pr=document.getElementById('cdProgress');
  const lb=document.getElementById('cdLabel');
  const st=document.getElementById('cdStatus');
  const hn=document.getElementById('cdHint');
  const bar=document.getElementById('bottomBar');
  if(rem<=0){
    pr.style.strokeDashoffset='0'; lb.textContent='OK';
    st.textContent='Готово'; hn.textContent='Нажмите на пиксель'; bar.classList.add('ready');
    if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  } else {
    const f=rem/60;
    pr.style.strokeDashoffset=String(CIRCUMFERENCE*(1-f));
    lb.textContent=Math.ceil(rem)+'с';
    st.textContent='Кулдаун'; hn.textContent=`Ждите ${Math.ceil(rem)} сек.`;
    bar.classList.remove('ready');
  }
}

function isOnCooldown(){return Date.now()<cooldownEnd}

// ── WEBSOCKET ──
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/${gameId}`);
  ws.onmessage=(evt)=>{
    try{
      const msg=JSON.parse(evt.data);
      if(msg.type==='pixel'){
        const off=(msg.y*canvasWidth+msg.x)*BPP;
        const oldTeam=pixelData[off];
        pixelData[off]=msg.team;
        pixelData[off+1]=msg.color;
        if(oldTeam>0&&oldTeam in stats) stats[oldTeam]--;
        if(msg.team in stats) stats[msg.team]++;
        updateStatsUI();
        renderPixel(msg.x,msg.y,msg.color);
        if(msg.user_id===userId&&msg.cooldown) startCooldown(msg.cooldown);
      }
      if(msg.type==='cooldown'){startCooldown(msg.remaining);showToast(`Кулдаун: ${msg.remaining} сек.`)}
      if(msg.type==='error') showToast(msg.msg);
    }catch(e){console.error('WS parse error',e)}
  };
  ws.onclose=()=>setTimeout(connectWS,2000);
  ws.onerror=()=>ws.close();
}

function sendPixel(x,y){
  if(!ws||ws.readyState!==WebSocket.OPEN){showToast('Нет соединения');return}
  ws.send(JSON.stringify({type:'place',x,y,user_id:userId,color:selectedColor}));
}

// ── COORDS ──
function screenToPixel(cx,cy){
  const r=wrap.getBoundingClientRect();
  return {x:Math.floor((cx-r.left-offsetX)/scale), y:Math.floor((cy-r.top-offsetY)/scale)};
}
function isInBounds(x,y){return x>=0&&x<canvasWidth&&y>=0&&y<canvasHeight}

// ── POINTER EVENTS ──
let pointerDown=false, pointerMoved=false, pointerStartTime=0;

wrap.addEventListener('pointerdown',(e)=>{
  pointerDown=true;pointerMoved=false;pointerStartTime=Date.now();
  dragStartX=e.clientX;dragStartY=e.clientY;
  dragOffsetX=offsetX;dragOffsetY=offsetY;
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener('pointermove',(e)=>{
  if(!pointerDown){
    const{x,y}=screenToPixel(e.clientX,e.clientY);
    if(isInBounds(x,y)){
      document.getElementById('coordsDisplay').textContent=`(${x}, ${y})`;
      if(scale>3){
        hoverCell.style.display='block';
        hoverCell.style.left=(x*scale+offsetX)+'px';
        hoverCell.style.top=(y*scale+offsetY)+'px';
        hoverCell.style.width=scale+'px'; hoverCell.style.height=scale+'px';
      } else hoverCell.style.display='none';
    }
    return;
  }
  const dx=e.clientX-dragStartX, dy=e.clientY-dragStartY;
  if(Math.abs(dx)>3||Math.abs(dy)>3) pointerMoved=true;
  offsetX=dragOffsetX+dx; offsetY=dragOffsetY+dy; applyTransform();
});
wrap.addEventListener('pointerup',(e)=>{
  if(!pointerDown)return; pointerDown=false;
  if(!pointerMoved&&Date.now()-pointerStartTime<300){
    const{x,y}=screenToPixel(e.clientX,e.clientY);
    if(isInBounds(x,y)&&!isOnCooldown()){
      sendPixel(x,y);
      if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    } else if(isOnCooldown()){
      showToast('Подождите окончания кулдауна');
      if(tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
    }
  }
});

// Zoom: wheel
wrap.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const zf=e.deltaY<0?1.15:1/1.15;
  const ns=Math.max(minScale,Math.min(scale*zf,60));
  offsetX=mx-(mx-offsetX)*(ns/scale);
  offsetY=my-(my-offsetY)*(ns/scale);
  scale=ns; applyTransform();
},{passive:false});

// Zoom: pinch
let touches=[];
wrap.addEventListener('touchstart',(e)=>{
  touches=Array.from(e.touches);
  if(touches.length===2)
    lastPinchDist=Math.hypot(touches[1].clientX-touches[0].clientX,touches[1].clientY-touches[0].clientY);
},{passive:true});
wrap.addEventListener('touchmove',(e)=>{
  if(e.touches.length===2){
    e.preventDefault();
    const t=Array.from(e.touches);
    const dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
    if(lastPinchDist>0){
      const mx=(t[0].clientX+t[1].clientX)/2, my=(t[0].clientY+t[1].clientY)/2;
      const r=wrap.getBoundingClientRect();
      const cx=mx-r.left, cy=my-r.top;
      const zf=dist/lastPinchDist;
      const ns=Math.max(minScale,Math.min(scale*zf,60));
      offsetX=cx-(cx-offsetX)*(ns/scale);
      offsetY=cy-(cy-offsetY)*(ns/scale);
      scale=ns; applyTransform();
    }
    lastPinchDist=dist;
  }
},{passive:false});
wrap.addEventListener('touchend',()=>{lastPinchDist=0});

window.addEventListener('resize',()=>{if(pixelData) setupCanvas()});
init();
</script>
</body>
</html>
